name: Monthly IGDB Sync

on:
  schedule:
    - cron: '0 2 1 * *'  # 2 AM UTC on the 1st of every month
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  sync:
    name: Sync IGDB → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 120  # First run can take up to 2 hours

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync-service/package-lock.json

      - name: Install dependencies
        working-directory: sync-service
        run: npm ci

      - name: Run sync
        working-directory: sync-service
        run: npx tsx src/syncAllFromIGDB.ts
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: 'false'
