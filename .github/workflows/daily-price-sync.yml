name: Daily Price Sync

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  workflow_dispatch:      # Manual trigger from GitHub UI

jobs:
  sync:
    name: Sync eBay prices → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4,444 games × 2s = ~2.5 hrs; 4-hr cap gives buffer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync-service/package-lock.json

      - name: Install dependencies
        working-directory: sync-service
        run: npm ci

      - name: Run price sync
        working-directory: sync-service
        run: npx tsx src/syncPrices.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
